<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>App Icon - 512x512</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 512px; height: 512px; overflow: hidden; }
  .icon {
    width: 512px; height: 512px;
    background: linear-gradient(145deg, #E8F0FE 0%, #DBEAFE 50%, #BFDBFE 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  /* Subtle grid */
  .icon::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 50% 50%, rgba(59,130,246,0.05) 0%, transparent 70%);
  }
  .logo {
    filter: drop-shadow(0 12px 40px rgba(37,99,235,0.35))
            drop-shadow(0 4px 12px rgba(37,99,235,0.2));
  }
</style>
</head>
<body>
<div class="icon">
  <svg class="logo" width="300" height="300" viewBox="0 0 300 300" fill="none">
    <defs>
      <linearGradient id="iconGrad" x1="150" y1="40" x2="150" y2="260" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#60A5FA"/>
        <stop offset="50%" stop-color="#3B82F6"/>
        <stop offset="100%" stop-color="#2563EB"/>
      </linearGradient>
      <linearGradient id="shine" x1="100" y1="40" x2="200" y2="260" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
        <stop offset="50%" stop-color="white" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <!-- Main A shape -->
    <path d="M150 40 L260 240 C264 248 258 256 250 256 L222 256 C214 256 207 251 204 244 L150 120 L96 244 C93 251 86 256 78 256 L50 256 C42 256 36 248 40 240 Z"
          fill="url(#iconGrad)"/>
    <!-- Shine overlay -->
    <path d="M150 40 L260 240 C264 248 258 256 250 256 L222 256 C214 256 207 251 204 244 L150 120 L96 244 C93 251 86 256 78 256 L50 256 C42 256 36 248 40 240 Z"
          fill="url(#shine)"/>
    <!-- Crossbar hint -->
    <rect x="88" y="185" width="124" height="8" rx="4" fill="white" opacity="0.25"/>
  </svg>
</div>
</body>
</html>
