<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Feature Graphic - 1024x500</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1024px; height: 500px; overflow: hidden;
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
  .container {
    width: 1024px; height: 500px;
    background: linear-gradient(135deg, #0F172A 0%, #1E3A5F 40%, #2563EB 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  /* Decorative circles */
  .circle1 {
    position: absolute; width: 600px; height: 600px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 50%; top: -200px; right: -100px;
  }
  .circle2 {
    position: absolute; width: 400px; height: 400px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%; bottom: -150px; left: -50px;
  }
  .circle3 {
    position: absolute; width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
    border-radius: 50%; top: 50px; left: 200px;
  }
  /* Grid pattern */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* Content */
  .content {
    display: flex; align-items: center; gap: 60px;
    position: relative; z-index: 2;
  }
  .logo-area {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  /* SVG Logo - A chevron */
  .logo-icon {
    width: 140px; height: 140px;
    filter: drop-shadow(0 8px 32px rgba(59,130,246,0.4));
  }
  .divider {
    width: 2px; height: 200px;
    background: linear-gradient(transparent, rgba(255,255,255,0.3), transparent);
  }
  .text-area {
    display: flex; flex-direction: column; gap: 16px;
  }
  .app-name {
    font-size: 56px; font-weight: 800; color: #FFFFFF;
    letter-spacing: -1px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.3);
  }
  .app-name span {
    background: linear-gradient(135deg, #60A5FA, #93C5FD);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .tagline {
    font-size: 22px; color: #94A3B8; font-weight: 400;
    line-height: 1.5;
  }
  .badges {
    display: flex; gap: 10px; margin-top: 8px;
  }
  .badge {
    padding: 6px 16px; border-radius: 20px;
    font-size: 14px; font-weight: 600; color: #E2E8F0;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    backdrop-filter: blur(4px);
  }
  /* Pie chart decoration */
  .pie-deco {
    position: absolute; right: 40px; bottom: 30px;
    opacity: 0.15;
  }
</style>
</head>
<body>
<div class="container">
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="circle3"></div>
  <div class="grid"></div>

  <div class="content">
    <div class="logo-area">
      <svg class="logo-icon" viewBox="0 0 140 140" fill="none">
        <defs>
          <linearGradient id="logoGrad" x1="70" y1="20" x2="70" y2="120" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#60A5FA"/>
            <stop offset="100%" stop-color="#3B82F6"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path d="M70 20 L120 110 C122 114 119 118 115 118 L105 118 C102 118 99 116 98 113 L70 52 L42 113 C41 116 38 118 35 118 L25 118 C21 118 18 114 20 110 Z"
              fill="url(#logoGrad)" filter="url(#glow)"/>
      </svg>
    </div>

    <div class="divider"></div>

    <div class="text-area">
      <div class="app-name"><span>Allocate</span></div>
      <div class="tagline">자산배분 전략 선택부터<br>ETF 매수 수량 계산까지</div>
      <div class="badges">
        <div class="badge">19가지 전략</div>
        <div class="badge">3개 유니버스</div>
        <div class="badge">원스텝 계산</div>
      </div>
    </div>
  </div>

  <!-- Decorative pie chart -->
  <svg class="pie-deco" width="120" height="120" viewBox="0 0 120 120">
    <circle cx="60" cy="60" r="50" fill="none" stroke="white" stroke-width="20"
            stroke-dasharray="94.2 220" transform="rotate(-90 60 60)"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#60A5FA" stroke-width="20"
            stroke-dasharray="62.8 220" stroke-dashoffset="-94.2" transform="rotate(-90 60 60)"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#34D399" stroke-width="20"
            stroke-dasharray="47.1 220" stroke-dashoffset="-157" transform="rotate(-90 60 60)"/>
    <circle cx="60" cy="60" r="50" fill="none" stroke="#FBBF24" stroke-width="20"
            stroke-dasharray="31.4 220" stroke-dashoffset="-204.1" transform="rotate(-90 60 60)"/>
  </svg>
</div>
</body>
</html>
