name: Update ETF Prices

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22:00, 전일)에 실행
    # 미국 장 마감(EST 16:00 = UTC 21:00) 이후
    - cron: '0 22 * * 1-5'  # 월~금만
  workflow_dispatch:  # 수동 실행 가능

permissions:
  contents: write
  pages: write

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch price data from Twelve Data
        env:
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        run: node scripts/fetch-prices.mjs

      - name: Prepare deploy directory
        run: |
          mkdir -p deploy/prices
          cp -r data/prices/* deploy/prices/
          cp -r static/* deploy/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: false
          commit_message: 'Update ETF prices - ${{ github.event.repository.updated_at }}'
